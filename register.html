<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PMLN Scheme Registration</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1534886181503098"
     crossorigin="anonymous"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="form-container">

    <div class="form-card">

      <h1>
        PMLN Scheme Registration
      </h1>

      <p class="subtitle">
        Register for the public welfare scheme
      </p>

      <form id="registrationForm">

        <div class="input-group">

          <label>Full Name</label>

          <input
            type="text"
            id="name"
            placeholder="Enter your full name"
            required
          >

        </div>

        <div class="input-group">

          <label>Phone Number</label>

          <input
            type="tel"
            id="phone"
            placeholder="03001234567"
            required
          >

        </div>

        <div class="input-group">

          <label>CNIC Number</label>

          <input
            type="text"
            id="cnic"
            placeholder="1234512345671"
            required
          >

        </div>

        <div class="input-group">

          <label>Date of Birth</label>

          <input
            type="date"
            id="dob"
            required
          >

        </div>

        <!-- WhatsApp Share -->

        <div class="whatsapp-box">

          <label>

            <input
              type="checkbox"
              id="shareCheck"
              required
            >

            Share with 10 friends on WhatsApp

          </label>

        </div>

        <button type="submit">
          Register Now
        </button>

      </form>

      <div id="successMessage"></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
